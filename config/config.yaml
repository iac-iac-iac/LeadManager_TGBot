# Telegram Bot Configuration
telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  proxy_url: "${TELEGRAM_PROXY_URL:}"
  proxy_type: "${TELEGRAM_PROXY_TYPE:HTTP}"
  request_timeout: 60
  retry_attempts: 5
  retry_delay: 5

# Bitrix24 Configuration
bitrix24:
  webhook_url: "${BITRIX24_WEBHOOK_URL}"
  proxy_url: "${BITRIX24_PROXY_URL:}"
  request_timeout: 60  # Увеличено с 30 до 60 сек для медленных запросов
  retry_attempts: 3
  retry_delay: 5
  # Лимиты REST (облако): https://apidocs.bitrix24.com/settings/performance/limits.html
  # Устойчивая интенсивность Y: типовые тарифы — 2 запроса/с; Enterprise — 5/с (укажите 5.0 при необходимости).
  # 0 — отключить выдерживание интервала между запросами в клиенте (не рекомендуется).
  rest_sustained_rps: 2.0
  # Параллельная проверка лидов на дубли; один лид = несколько вызовов API — при 2 req/s оставьте 1.
  duplicate_check_max_parallel: 1
  duplicate_check_fields:
    - phone
    - company_name
    - address
  # ID полей-списка «тип услуги» в Bitrix; при смене портала подставьте свои
  service_type_map:
    "ГЦК": 101
    "ГЦК без КЦ": 102
    "Call-центр": 103
    "Лид-код": 104
    "Авито": 105
    "Рекрутинг": 106
  default_service_type_id: 101

# Database Configuration
database:
  path: "${DATABASE_PATH}"
  echo: false

# Uploads Configuration
uploads:
  folder: "${UPLOADS_FOLDER}"
  allowed_extensions:
    - csv
  encoding: utf-8
  delimiter: ";"

# Admin Configuration
admin:
  telegram_ids: "${ADMIN_TELEGRAM_IDS}"

# Logging Configuration
logging:
  level: "${LOG_LEVEL}"
  file: "${LOG_FILE}"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Cleanup Configuration
cleanup:
  logs_days: 30
  duplicate_leads_days: 90
  imported_leads_days: 180

# Lead Configuration
leads:
  max_per_request: 200
  fifo_order: true
